<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolay Gelsin - İşe Giriş Çıkış Çizelgesi</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-main: #f3f4f6;
            --bg-card: #ffffff;
            --border-color: #e5e7eb;
            --border-light: #f3f4f6;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 1200px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-placeholder {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .title-box {
            text-align: right;
        }

        .title-box h1 {
            margin: 0;
            font-size: 20px;
            color: var(--text-main);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            border-right: 1px solid var(--border-light); 
        }

        th:last-child, td:last-child {
            border-right: none;
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 13px;
        }

        td {
            height: 35px; 
        }

        @media print {
            body { background-color: white; padding: 0; }
            .container { box-shadow: none; padding: 0; }
            th { background-color: #f2f2f2 !important; -webkit-print-color-adjust: exact; }
            th, td { border-right: 1px solid #ddd; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-placeholder">

                Kolay Gelsin
            </div>
            <div class="title-box">
                <h1>İşe Giriş Çıkış İmza Çizelgesi</h1>

        </div>
        <table>

                    <th style="width:100px;">İmza</th><th>Çıkış Saati</th><th style="width:100px;">İmza</th>
                    <th>Fazla Mesai Saati</th><th>Fazla Mesai Nedeni</th>

            </thead>
            <tbody>

                <tr><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>

    </div>
</body>
</html>
