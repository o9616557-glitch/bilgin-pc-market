<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#3a86ff" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="256" cy="256" r="220" fill="none" stroke="#111111" stroke-width="12" />
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#neon)" stroke-width="4" stroke-dasharray="90 40 15 40" opacity="0.9" />
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00d2ff" stroke-width="1" stroke-dasharray="5 15" opacity="0.4" />
  
  <text x="256" y="230" font-family="Arial, sans-serif" font-size="68" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="5">BİLGİN PC</text>
  
  <text x="256" y="315" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#00d2ff" text-anchor="middle" letter-spacing="8" filter="url(#glow)">HOŞGELDİNİZ</text>
</svg>
